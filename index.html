<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝曹怡芳外婆生日快乐</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            background: linear-gradient(135deg, #8b0000 0%, #d32f2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Floating Peach Blossoms Background */
        .blossom {
            position: absolute;
            font-size: 1.5em;
            color: #ffb7c5;
            user-select: none;
            animation: floatDown linear infinite;
            opacity: 0.7;
        }

        @keyframes floatDown {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        /* Elegant Glass Card */
        .card-container {
            width: 90%;
            max-width: 450px;
            height: 600px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 2px solid rgba(212, 175, 55, 0.6);
            position: relative;
            text-align: center;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        /* Slide Transitions */
        .slide {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
        }

        .slide.active {
            display: block;
            opacity: 1;
            animation: gentleFade 1s ease-in-out;
        }

        @keyframes gentleFade {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        /* Typography */
        h1 { color: #b71c1c; font-size: 2.2em; margin-bottom: 20px; letter-spacing: 2px; }
        p { color: #444; font-size: 1.3em; line-height: 1.8; font-weight: 500; margin-bottom: 10px; }
        .gold-text { color: #d4af37; font-weight: bold; font-size: 1.2em;}
        .icon { font-size: 3.5em; margin-bottom: 15px; display: block; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.1)); }
        .small-text { font-size: 1em; color: #666; margin-top: 20px; }

        /* Glowing Button */
        .btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 35px;
            background: linear-gradient(45deg, #d4af37, #b8860b);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            z-index: 20;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
        }
    </style>
</head>
<body>

<div id="blossoms-container"></div>

<div class="card-container">
    <div class="slide active">
        <span class="icon">🏮</span>
        <h1>曹怡芳 外婆</h1>
        <p>祝您生日快乐</p>
        <p class="gold-text">2026年5月23日</p>
    </div>

    <div class="slide">
        <span class="icon">🕊️</span>
        <h1>岁月长情</h1>
        <p>从小到大，<br>都是您温柔地牵着我的手。</p>
        <p>您的掌心，<br>是我记忆里最温暖的地方。</p>
    </div>

    <div class="slide">
        <span class="icon">🍲</span>
        <h1>感恩有您</h1>
        <p>忘不了您做的一日三餐，<br>还有您看我时，眼里满满的笑意。</p>
        <p class="gold-text">外婆，您真的辛苦了！</p>
    </div>

    <div class="slide">
        <span class="icon">🎂</span>
        <h1>欢聚一堂</h1>
        <p>今天是您的专属节日！</p>
        <p>我们要一起吃甜甜的蛋糕，<br>看您笑得像花儿一样灿烂。</p>
    </div>

    <div class="slide">
        <span class="icon">🌲</span>
        <h1>松鹤延年</h1>
        <p>祈愿外婆：<br>福如东海长流水，<br>寿比南山不老松。</p>
        <p>愿您身体健健康康，无病无灾！</p>
    </div>

    <div class="slide">
        <span class="icon">💖</span>
        <h1>岁岁平安</h1>
        <p>愿时光慢一点，<br>让我们能陪您更久、更久。</p>
        <p class="gold-text">我们永远、永远爱您！</p>
        <p class="small-text">—— 您的家人 敬上</p>
    </div>

    <button class="btn" onclick="nextSlide()">开启祝福 ✨</button>
</div>

<script>
    // Logic for sliding through the cards
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const btn = document.querySelector('.btn');

    function nextSlide() {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');

        // Change button text based on the slide
        if (current === 0) {
            btn.innerHTML = "开启祝福 ✨";
        } else if (current === slides.length - 1) {
            btn.innerHTML = "重新回顾 ❤️";
        } else {
            btn.innerHTML = "下一页 ✨";
        }
    }

    // Logic for creating falling peach blossoms
    const container = document.getElementById('blossoms-container');
    const blossomIcons = ['🌸', '💮', '✨', '🏮'];

    for (let i = 0; i < 25; i++) {
        let blossom = document.createElement('div');
        blossom.className = 'blossom';
        blossom.innerText = blossomIcons[Math.floor(Math.random() * blossomIcons.length)];
        
        // Randomize position, size, and animation duration
        blossom.style.left = Math.random() * 100 + 'vw';
        blossom.style.fontSize = (Math.random() * 1.5 + 1) + 'em';
        blossom.style.animationDuration = (Math.random() * 6 + 6) + 's';
        blossom.style.animationDelay = Math.random() * 5 + 's';
        
        container.appendChild(blossom);
    }
</script>

</body>
</html>
